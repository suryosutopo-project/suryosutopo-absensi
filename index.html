                    <div id="location-status" class="mt-3 text-center text-xs text-slate-400 flex items-center justify-center gap-1"></div>

            <section id="page-admin" class="hidden space-y-6">

    <script>
        // --- KONFIGURASI SUPABASE (Ganti dengan kredensial proyek Anda) ---
        const SUPABASE_URL = "https://czrfgfsktsnvdwmjpzbx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6cmZnZnNrdHNudmR3bWpwemJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NzkyNTEsImV4cCI6MjA5ODI1NTI1MX0.8xF64JQQZHst1iY-PdO8qWEaeCpF5S5W3cqvU8tyzZY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- KONFIGURASI KANTOR (GEOFENCING) ---
        const KANTOR_LAT = -6.99227672717298;  // Ganti koordinat latitude kantor Anda
        const KANTOR_LON = 110.4288534847692; // Ganti koordinat longitude kantor Anda
        const RADIUS_MAKSIMAL_METER = 750; // Jarak toleransi maksimal karyawan dari kantor

        let userAktif = null;

        // --- Proteksi Login & Sesi ---
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                userAktif = session.user;
                document.getElementById('page-login').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                
                // Set Nama & Avatar HP
                const namaUser = userAktif.user_metadata.full_name || userAktif.email;
                document.getElementById('employee-name').innerText = namaUser;
                document.getElementById('user-avatar').innerText = namaUser.substring(0,2).toUpperCase();

                // Hak Akses Admin (jika email mengandung domain tertentu / role khusus)
                if(userAktif.email.includes('teddy_dapen@yahoo.com')) {
                    document.getElementById('nav-admin').classList.remove('hidden');
                }

                muatStatusHariIni();
            } else {
                document.getElementById('page-login').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // Form Login Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("Gagal login: " + error.message);
        });

        async function handleLogout() {
            await supabaseClient.auth.signOut();
        }

        // --- Fitur Jam Realtime ---
        function updateWaktu() {
            const sekarang = new Date();
            document.getElementById('live-clock').innerText = sekarang.toLocaleTimeString('id-ID', { hour12: false }).replace(/\./g, ':');
            document.getElementById('live-date').innerText = sekarang.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateWaktu, 1000); updateWaktu();

        // --- Rumus Haversine (Hitung Jarak Valid Akurat GPS HP ke Kantor) ---
        function hitungJarak(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // --- Navigasi Halaman ---
        function switchPage(page) {
            if (page === 'karyawan') {
                document.getElementById('page-karyawan').classList.remove('hidden');
                document.getElementById('page-admin').classList.add('hidden');
                muatStatusHariIni();
            } else {
                document.getElementById('page-karyawan').classList.add('hidden');
                document.getElementById('page-admin').classList.remove('hidden');
                renderTabelAdmin();
            }
        }

        // --- Proses Absen ---
        function prosesAbsen(jenis) {
    const sekarang = new Date();
    
    // Perbaikan format tanggal yang aman untuk semua HP
    const offset = sekarang.getTimezoneOffset();
    const tglLokal = new Date(sekarang.getTime() - (offset * 60 * 1000));
    const formatTanggal = tglLokal.toISOString().split('T')[0]; // Hasil: YYYY-MM-DD
    
    // Perbaikan format jam yang aman untuk semua HP
    const jam = String(sekarang.getHours()).padStart(2, '0');
    const menit = String(sekarang.getMinutes()).padStart(2, '0');
    const formatJam = `${jam}:${menit}`;

    dapatkanLokasi(async (koordinat) => {
        // Tarik data dari database Supabase
        let { data: dataHariIni, error: errorFetch } = await supabaseClient
            .from('absensi')
            .select('*')
            .eq('user_id', userAktif.id)
            .eq('tanggal', formatTanggal)
            .maybeSingle();

        if (errorFetch) {
            console.error("Gagal memeriksa data:", errorFetch.message);
            return;
        }

        if (jenis === 'Masuk') {
            if (dataHariIni && dataHariIni.jam_masuk) {
                alert("Anda sudah melakukan absen masuk hari ini!");
                return;
            }

            // Tentukan status tepat waktu atau terlambat
            const jamSekarang = sekarang.getHours();
            const status = jamSekarang < BATAS_JAM_MASUK ? 'Tepat Waktu' : 'Terlambat';

            // Simpan absen masuk ke Supabase
            const { error: errorInsert } = await supabaseClient
                .from('absensi')
                .insert({
                    user_id: userAktif.id,
                    nama: userAktif.user_metadata.full_name || userAktif.email,
                    tanggal: formatTanggal,
                    jam_masuk: formatJam,
                    status: status,
                    lokasi: koordinat
                });

            if (errorInsert) {
                alert("Gagal absen masuk: " + errorInsert.message);
            } else {
                alert(`Absen Masuk Berhasil (${status}) pada pukul ${formatJam}`);
            }

        } else if (jenis === 'Pulang') { // <--- Di sinilah letak perbaikan kurung kurawal 'else if' tersebut
            if (!dataHariIni || !dataHariIni.jam_masuk) {
                alert("Anda harus melakukan Absen Masuk terlebih dahulu hari ini!");
                return;
            }
            if (dataHariIni.jam_pulang) {
                alert("Anda sudah melakukan absen pulang hari ini!");
                return;
            }

            // Update data absen pulang ke Supabase berdasarkan ID baris hari ini
            const { error: errorUpdate } = await supabaseClient
                .from('absensi')
                .update({ jam_pulang: formatJam })
                .eq('id', dataHariIni.id);

            if (errorUpdate) {
                alert("Gagal absen pulang: " + errorUpdate.message);
            } else {
                alert(`Absen Pulang Berhasil pada pukul ${formatJam}`);
            }
        }

        // Muat ulang status tampilan di HP karyawan setelah absen
        muatStatusHariIni();
            }, () => {
                alert("Nyalakan GPS HP Anda dan izinkan akses lokasi untuk bisa mengabsen.");
            }, { enableHighAccuracy: true });
        }

       async function muatStatusHariIni() {
    // Cara yang lebih aman dan pasti menghasilkan YYYY-MM-DD di semua HP
    const sekarang = new Date();
    const offset = sekarang.getTimezoneOffset();
    const tglLokal = new Date(sekarang.getTime() - (offset * 60 * 1000));
    const tglHariIni = tglLokal.toISOString().split('T')[0];

    let { data, error } = await supabaseClient
        .from('absensi')
        .select('*')
        .eq('user_id', userAktif.id)
        .eq('tanggal', tglHariIni)
        .maybeSingle();
        
    if (error) {
        console.error("Gagal memuat status hari ini:", error.message);
        return;
    }

    // Mengisi teks di kotak halaman karyawan
    document.getElementById('today-masuk').innerText = data?.jam_masuk || '-';
    document.getElementById('today-pulang').innerText = data?.jam_pulang || '-';
}

        async function renderTabelAdmin() {
            let { data: semuaAbsen } = await supabaseClient.from('absensi').select('*').order('tanggal', { ascending: false });
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            semuaAbsen?.forEach(item => {
                const tr = document.createElement('tr');
                const badgeClass = item.status === 'Tepat Waktu' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700';
                tr.innerHTML = `
                    <td class="p-4 font-medium">${item.nama}</td>
                    <td class="p-4">${item.tanggal}</td>
                    <td class="p-4 font-mono">${item.jam_masuk || '-'}</td>
                    <td class="p-4 font-mono">${item.jam_pulang || '-'}</td>
                    <td class="p-4"><span class="px-2 py-1 text-xs font-semibold rounded-full ${badgeClass}">${item.status}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
